<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    .home { padding: 28px 32px; display: grid; grid-template-rows: 1fr 300px; gap: 18px; height: 100%; }
    .hero { display: grid; grid-template-columns: 360px 1fr; gap: 24px; min-height: 0; }
    .hero-copy { display: flex; flex-direction: column; justify-content: center; gap: 18px; }
    .hero-copy .eyebrow { color: #1f7a67; font-size: 13px; letter-spacing: 0.12em; }
    .hero-copy .highlight { color: #c5a059; }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .deck { position: relative; display: flex; align-items: center; justify-content: center; }
    .novel-card {
      position: absolute; width: 220px; height: 300px; border-radius: 22px; padding: 18px;
      background: linear-gradient(160deg, #fff 0%, #f3f8f5 100%);
      border: 1px solid rgba(31,122,103,0.12);
      box-shadow: 0 18px 40px rgba(15,75,68,0.12);
    }
    .novel-card.center { transform: translateY(-18px) scale(1.06); z-index: 3; }
    .novel-card.left { transform: translateX(-130px) rotate(-5deg) scale(0.94); z-index: 2; opacity: 0.92; }
    .novel-card.right { transform: translateX(130px) rotate(5deg) scale(0.94); z-index: 2; opacity: 0.92; }
    .cover { height: 130px; border-radius: 14px; background: linear-gradient(135deg, #1f7a67, #5aa08f); margin-bottom: 14px; }
    .bubble {
      position: absolute; top: 24px; right: 40px; max-width: 260px; padding: 14px 16px; border-radius: 18px 18px 6px 18px;
      background: rgba(255,255,255,0.95); border: 1px solid rgba(31,122,103,0.14); font-size: 13px; color: #142f2f;
      box-shadow: 0 12px 28px rgba(31,122,103,0.12);
    }
    .bottom { display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px; min-height: 0; }
    .panel { padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
    .panel h3 { font-size: 15px; color: #0f4b44; }
    .log-item, .list-item { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(31,122,103,0.08); font-size: 13px; }
    .list-item strong { color: #142f2f; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">MN</div>
      <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>首页</div>
      <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>书架</div>
      <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>角色</div>
      <div class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>文风</div>
    </aside>
    <main class="main home">
      <section class="hero">
        <div class="hero-copy">
          <div class="pill">NOVELIST'S DESK</div>
          <div class="title">每一位<span class="highlight">小说家</span> ✦</div>
          <p class="subtitle">与 AI 并肩写作，把零散灵感写成完整章节。从蓝图到正文，小说家的每一步都有智能辅助。</p>
          <div class="hero-actions">
            <button class="btn btn-primary">继续写作</button>
            <button class="btn btn-ghost">新建作品</button>
            <button class="btn btn-ghost">灵感模式</button>
          </div>
        </div>
        <div class="deck">
          <div class="bubble">这一章的转折可以再大胆一点。</div>
          <div class="novel-card left">
            <div class="cover" style="background:linear-gradient(135deg,#967e4b,#c5a059)"></div>
            <strong>雾港档案</strong>
            <p class="muted" style="font-size:12px;margin-top:8px;">悬疑 · 12 章</p>
          </div>
          <div class="novel-card center">
            <div class="cover"></div>
            <strong>青玉长歌</strong>
            <p class="muted" style="font-size:12px;margin-top:8px;">玄幻 · 28 章 · 进行中</p>
          </div>
          <div class="novel-card right">
            <div class="cover" style="background:linear-gradient(135deg,#4b6a96,#7ea0c8)"></div>
            <strong>星尘旅人</strong>
            <p class="muted" style="font-size:12px;margin-top:8px;">科幻 · 8 章</p>
          </div>
        </div>
      </section>
      <section class="bottom">
        <div class="card panel">
          <h3>最近动态</h3>
          <div class="log-item"><span>完成《青玉长歌》第 14 章生成</span><span class="muted">2 小时前</span></div>
          <div class="log-item"><span>更新角色「沈砚」关系图谱</span><span class="muted">昨天</span></div>
          <div class="log-item"><span>导入文风模板「冷峻纪实」</span><span class="muted">昨天</span></div>
        </div>
        <div class="card panel">
          <h3>书架速览</h3>
          <div class="list-item"><strong>青玉长歌</strong><span class="tag">写作中</span></div>
          <div class="list-item"><strong>雾港档案</strong><span class="tag">大纲完成</span></div>
          <div class="list-item"><strong>星尘旅人</strong><span class="tag">灵感立项</span></div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
