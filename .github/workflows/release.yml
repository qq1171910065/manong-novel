name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (web)
        run: pnpm run typecheck

      - name: Typecheck (main/preload)
        run: pnpm run typecheck:node

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

  build-windows:
    needs: quality-gate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        env:
          ELECTRON_BUILDER_PUBLISH: never
        run: pnpm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-setup.exe
          if-no-files-found: error

  build-macos:
    needs: quality-gate
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS DMG
        env:
          ELECTRON_BUILDER_PUBLISH: never
        run: pnpm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: artifacts

      - name: Prepare versioned release layout
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "release/${VERSION}/windows" "release/${VERSION}/macos"
          WIN=$(find artifacts -name '*-setup.exe' | head -n 1)
          MAC=$(find artifacts -name '*.dmg' | head -n 1)
          cp "$WIN" "release/${VERSION}/windows/"
          cp "$MAC" "release/${VERSION}/macos/"
          ls -R release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Manong Novel ${{ github.ref_name }}
          generate_release_notes: true
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
